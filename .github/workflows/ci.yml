name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - run: bun install --frozen-lockfile
      - run: bun run check

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - run: bun install --frozen-lockfile
      - run: bunx tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      DISCORD_TOKEN: test-token
      DISCORD_CLIENT_ID: "000000000000000000"
      DISCORD_GUILD_ID: "000000000000000000"
      BOT_DEVELOPER_ROLE_ID: "000000000000000000"
      LOG_CHANNEL_ID: "000000000000000000"
      DATABASE_URL: "http://localhost:9120"
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - run: bun install --frozen-lockfile
      - run: bun test
